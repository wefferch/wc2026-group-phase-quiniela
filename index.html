<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Predictor</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 18px;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  color: #111827;
}

.page {
  max-width: 1400px;
  margin: 0 auto;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  gap: 44px;
  margin-bottom: 20px;
}

.hero-logo {
  width: 260px;
  max-width: 42vw;
  display: block;
}

.hero-divider {
  width: 1px;
  height: 230px;
  background: #c7ccd6;
}

.hero-title h1 {
  margin: 0;
  font-size: clamp(42px, 6vw, 82px);
  line-height: 0.96;
  color: #0b214f;
  font-weight: 900;
  letter-spacing: -2px;
}

.hero-title h2 {
  margin: 8px 0 0;
  font-size: clamp(30px, 4vw, 56px);
  line-height: 1;
  color: #0b214f;
  font-weight: 800;
}

/* COUNTDOWN */
#statusBanner {
  margin-bottom: 16px;
}

.banner {
  background: linear-gradient(90deg, #0a172d, #0f2445, #0a172d);
  color: white;
  border-radius: 10px;
  padding: 18px 22px;
  font-weight: bold;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.18);
}

.countdown-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr 1.6fr;
  gap: 16px;
  align-items: center;
}

.lock-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 54px;
  height: 54px;
  background: white;
  color: #0f2445;
  border-radius: 50%;
  font-size: 28px;
  margin-right: 14px;
}

.lock-label {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.count-item {
  text-align: center;
}

.count-number {
  display: block;
  font-size: 36px;
  line-height: 1;
}

.count-text {
  font-size: 14px;
  opacity: 0.9;
}

.lock-message {
  font-size: 16px;
  line-height: 1.35;
}

.locked {
  background: linear-gradient(90deg, #b91c1c, #dc2626);
  text-align: center;
}

/* FORM */
.card {
  background: white;
  padding: 20px;
  margin-bottom: 18px;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
}

.participant-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

.field label {
  display: block;
  font-weight: 800;
  margin-bottom: 8px;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 13px 14px;
  margin-bottom: 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #fff;
}

input:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

/* ACCORDION */
.group-card {
  margin-bottom: 6px;
  border-radius: 9px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
}

.group-header {
  background: linear-gradient(90deg, #0047cc, #003399);
  color: white;
  padding: 12px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  font-weight: 800;
  font-size: 18px;
}

.toggle-icon {
  font-size: 26px;
  font-weight: bold;
  width: 28px;
  text-align: center;
  transition: transform 0.2s ease;
}

.group-body {
  display: none;
  background: white;
  padding: 10px 20px;
}

.group-body.active {
  display: block;
}

/* MATCH ROWS */
.match {
  display: grid;
  grid-template-columns: 1.1fr 44px 1.1fr 1.25fr 90px 20px 90px;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid #e5e7eb;
}

.match:last-child {
  border-bottom: none;
}

.team-name {
  font-weight: 800;
  font-size: 15px;
}

.vs-label,
.dash-label {
  text-align: center;
  font-weight: 700;
  color: #374151;
}

.match-time {
  color: #4b5563;
  font-size: 14px;
  text-align: center;
}

.city-name {
  color: #6b7280;
  font-size: 12px;
}

.score input {
  width: 100%;
  text-align: center;
  padding: 9px 8px;
  font-size: 16px;
}

/* INFO SECTIONS */
.info-content {
  line-height: 1.65;
  font-size: 15px;
}

.info-content p {
  margin: 9px 0;
}

.info-content ul {
  margin-top: 6px;
  padding-left: 22px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 16px;
  font-size: 19px;
  background: linear-gradient(90deg, #0052cc, #2563eb);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(37, 99, 235, 0.24);
}

button:hover {
  opacity: 0.95;
}

button:disabled {
  background: #9ca3af;
  cursor: not-allowed;
  box-shadow: none;
}

/* MOBILE */
@media (max-width: 900px) {
  body {
    padding: 12px;
  }

  .hero {
    justify-content: center;
    gap: 18px;
    text-align: center;
  }

  .hero-divider {
    display: none;
  }

  .hero-logo {
    width: 170px;
    max-width: 100%;
  }

  .hero-title {
    width: 100%;
  }

  .participant-grid {
    grid-template-columns: 1fr;
  }

  .countdown-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .lock-label,
  .lock-message {
    grid-column: 1 / -1;
  }

  .match {
    grid-template-columns: 1fr 28px 1fr;
    gap: 8px;
    padding: 12px 0;
  }

  .match-time {
    grid-column: 1 / -1;
    order: 4;
  }

  .score {
    width: 100%;
  }

  .score.home-score {
    grid-column: 1 / 2;
    order: 5;
  }

  .dash-label {
    order: 6;
  }

  .score.away-score {
    grid-column: 3 / 4;
    order: 7;
  }

  .team-name {
    text-align: center;
  }
}
</style>
</head>

const firstMatchTime = new Date(matches[0].utc);

let isLocked = false;
const banner = document.getElementById("statusBanner");

// Countdown
function updateCountdown() {
  const now = new Date();
  const diff = firstMatchTime - now;

  if (diff <= 0) {
    isLocked = true;
    banner.innerHTML = `<div class="banner locked">Predictions are LOCKED</div>`;
    disableInputs();
    return;
  }

  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hrs = Math.floor((totalSeconds % 86400) / 3600);
  const mins = Math.floor((totalSeconds % 3600) / 60);
  const secs = totalSeconds % 60;

  banner.innerHTML = `
    <div class="banner countdown">
      <div class="countdown-grid">
        <div class="lock-label"><span class="lock-icon">🔒</span> Locking in:</div>
        <div class="count-item"><span class="count-number">${days}</span><span class="count-text">days</span></div>
        <div class="count-item"><span class="count-number">${hrs}</span><span class="count-text">hours</span></div>
        <div class="count-item"><span class="count-number">${mins}:${String(secs).padStart(2, "0")}</span><span class="count-text">min:sec</span></div>
        <div class="lock-message">Predictions will be LOCKED at the start of the first match.</div>
      </div>
    </div>
  `;
}

setInterval(updateCountdown, 1000);
updateCountdown();

function disableInputs() {
  document.querySelectorAll("input").forEach(i => i.disabled = true);
  document.getElementById("submitBtn").disabled = true;
}

// Score validation
function sanitizeScore(value) {
  const num = Number(value);
  if (isNaN(num) || num < 0) return 0;
  return Math.floor(num);
}

document.addEventListener("keydown", function(e) {
  if (e.target.type === "number") {
    if (e.key === "-" || e.key === "e" || e.key === "+") {
      e.preventDefault();
    }
  }
});

function formatLocalTime(utc) {
  return new Intl.DateTimeFormat([], {
    dateStyle:"medium",
    timeStyle:"short"
  }).format(new Date(utc));
}

// Local storage
const STORAGE_KEY = "wc_predictions";

function saveLocal() {
  const data = {};

  matches.forEach(m => {
    const h = sanitizeScore(document.getElementById(`h_${m.id}`)?.value);
    const a = sanitizeScore(document.getElementById(`a_${m.id}`)?.value);

    document.getElementById(`h_${m.id}`).value = h;
    document.getElementById(`a_${m.id}`).value = a;

    data[m.id] = { h, a };
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

// Render
const container = document.getElementById("matches");
const grouped = {};

matches.forEach(m => {
  if (!grouped[m.group]) grouped[m.group] = [];
  grouped[m.group].push(m);
});

Object.keys(grouped).forEach(group => {

  const wrapper = document.createElement("div");
  wrapper.className = "group-card";

  const header = document.createElement("div");
  header.className = "group-header";
  header.innerHTML = `
    <span>Group ${group}</span>
    <span class="toggle-icon">+</span>
  `;

  const body = document.createElement("div");
  body.className = "group-body";

  const icon = header.querySelector(".toggle-icon");

  if (group === "A") {
    body.classList.add("active");
    icon.style.transform = "rotate(45deg)";
  }

  header.onclick = () => {
    const open = body.classList.contains("active");
    body.classList.toggle("active");
    icon.style.transform = open ? "rotate(0deg)" : "rotate(45deg)";
  };

  grouped[group].forEach(m => {

    const valH = sanitizeScore(saved[m.id]?.h ?? 0);
    const valA = sanitizeScore(saved[m.id]?.a ?? 0);

    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <div class="team-name">${m.s1}</div>
      <div class="vs-label">vs</div>
      <div class="team-name">${m.s2}</div>
      <div class="match-time">${formatLocalTime(m.utc)}<br><span class="city-name">${m.city}</span></div>
      <div class="score home-score">
        <input class="score-input" type="number" min="0" step="1" value="${valH}" id="h_${m.id}">
      </div>
      <div class="dash-label">-</div>
      <div class="score away-score">
        <input class="score-input" type="number" min="0" step="1" value="${valA}" id="a_${m.id}">
      </div>
    `;

    body.appendChild(div);
  });

  wrapper.appendChild(header);
  wrapper.appendChild(body);
  container.appendChild(wrapper);
});

//SUBMIT
function submitPredictions() {

  if (isLocked) {
    alert("Predictions are locked");
    return;
  }

  // Get values
  const nameValue = document.getElementById("name").value.trim();
  const countryValue = document.getElementById("country").value.trim();
  const phoneValue = document.getElementById("phone").value.trim();
  const emailValue = document.getElementById("email").value.trim();

  // Required fields validation
  if (!nameValue || !countryValue || !phoneValue || !emailValue) {
    alert("Please complete Participant Details fields / Por favor complete todos los campos de informacion del participante");
    return;
  }

  // Email validation
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailRegex.test(emailValue)) {
    alert("Please enter a valid email address / Ingrese un email valido");
    return;
  }

  const payload = {
    name: nameValue,
    country: countryValue,
    phone: phoneValue,
    email: emailValue,
    predictions: []
  };

  matches.forEach(m => {
    payload.predictions.push({
      matchId: m.id,
      home: m.s1,
      away: m.s2,
      homeScore: sanitizeScore(document.getElementById(`h_${m.id}`).value),
      awayScore: sanitizeScore(document.getElementById(`a_${m.id}`).value),
      utc: m.utc,
      localTime: formatLocalTime(m.utc)
    });
  });

  fetch(API_URL, {
    method:"POST",
    body:JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    alert("Predictions submitted successfully!");
  });

}

</script>
