<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Knockout Predictor</title>

<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 18px; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; }
.page { max-width: 1200px; margin: 0 auto; }

/* HERO */
.hero { display: flex; align-items: center; gap: 44px; margin-bottom: 20px; }
.hero-title h1 { margin: 0; font-size: clamp(32px, 5vw, 56px); line-height: 0.96; color: #0b214f; font-weight: 900; letter-spacing: -1px; }
.hero-title h2 { margin: 8px 0 0; font-size: clamp(22px, 3vw, 36px); line-height: 1; color: #0047cc; font-weight: 800; }

/* ROUND TABS */
.tabs { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; }
.tab { padding: 12px 18px; background: #e5e7eb; border: none; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; color: #4b5563; white-space: nowrap; transition: all 0.2s; }
.tab.active { background: #0047cc; color: white; }

/* CARDS & GRIDS */
.card { background: white; padding: 20px; margin-bottom: 18px; border-radius: 12px; box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08); }
.participant-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
.field label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 14px; }
input { width: 100%; padding: 12px 14px; font-size: 16px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; }
input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }

/* MATCH ROWS */
.round-pane { display: none; }
.round-pane.active { display: block; }
.match-card { border-bottom: 1px solid #e5e7eb; padding: 16px 0; display: grid; grid-template-columns: 1.5fr 80px 40px 80px 1.5fr; align-items: center; gap: 16px; }
.match-card:last-child { border-bottom: none; }
.match-info-label { grid-column: 1 / -1; font-size: 12px; color: #6b7280; font-weight: bold; margin-bottom: -8px; }
.team { font-weight: 800; font-size: 16px; color: #0b214f; }
.team.home { text-align: right; }
.team.away { text-align: left; }
.vs { text-align: center; font-weight: 700; color: #6b7280; font-size: 14px; }
.score-input { text-align: center; font-weight: 800; font-size: 18px; padding: 8px; }

/* TIE BREAKER / PENALTIES */
.penalty-box { grid-column: 1 / -1; background: #fef2f2; border: 1px dashed #f87171; border-radius: 8px; padding: 12px; text-align: center; font-size: 14px; display: none; }
.penalty-box.show { display: block; }
.p-btn { background: #fff; border: 1px solid #d1d5db; padding: 6px 14px; font-weight: 700; border-radius: 6px; cursor: pointer; margin: 0 6px; }
.p-btn.selected { background: #dc2626; color: white; border-color: #dc2626; }

/* SUBMIT BUTTON */
.submit-btn { width: 100%; padding: 16px; font-size: 19px; background: linear-gradient(90deg, #0052cc, #2563eb); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.24); margin-top: 10px; }
.submit-btn:hover { opacity: 0.95; }

@media (max-width: 768px) {
  .participant-grid { grid-template-columns: 1fr; gap: 12px; }
  .match-card { grid-template-columns: 1fr 65px 20px 65px 1fr; gap: 8px; }
  .team { font-size: 14px; text-align: center !important; }
}
</style>
</head>
<body>

<div class="page">

  <div class="hero">
    <div class="hero-title">
      <h1>World Cup 2026</h1>
      <h2>Knockout Stage Predictions</h2>
    </div>
  </div>

  <div class="card">
    <div class="participant-grid">
      <div class="field"><label for="email">Email</label><input id="email" type="email" placeholder="Enter email"></div>
      <div class="field"><label for="name">Full Name</label><input id="name" placeholder="Enter full name"></div>
      <div class="field"><label for="country">Country</label><input id="country" placeholder="Enter country"></div>
      <div class="field"><label for="phone">Phone</label><input id="phone" type="tel" placeholder="Enter phone"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('r32')">Round of 32</button>
    <button class="tab" onclick="switchTab('r16')">Round of 16</button>
    <button class="tab" onclick="switchTab('qf')">Quarterfinals</button>
    <button class="tab" onclick="switchTab('sf')">Semifinals</button>
    <button class="tab" onclick="switchTab('finals')">Finals</button>
  </div>

  <div class="card">
    <div id="r32" class="round-pane active"></div>
    <div id="r16" class="round-pane"></div>
    <div id="qf" class="round-pane"></div>
    <div id="sf" class="round-pane"></div>
    <div id="finals" class="round-pane"></div>
  </div>

  <button class="submit-btn" onclick="submitKnockouts()">✈ Submit Knockout Predictions</button>
</div>

<script>
// Replace this with your updated Google Apps Script Web App URL deployment link
const API_URL = "https://script.google.com/macros/s/AKfycbxnm5v-uwclC-1vwgMXTJyHu6mwzeAGn3LRGeN1iR1Bn2C4CK5tOwtCKZnM1OcbE-ke/exec";

// Bracket config mapping matching exact requested routes
const bracketLayout = {
  r32: [
    { id: 73, nextMatch: 90, side: 'home', t1: "South Africa", t2: "Canada" },
    { id: 75, nextMatch: 90, side: 'away', t1: "Netherlands", t2: "Morocco" },
    { id: 74, nextMatch: 89, side: 'home', t1: "Germany", t2: "Paraguay" },
    { id: 77, nextMatch: 89, side: 'away', t1: "France", t2: "Sweden" },
    { id: 81, nextMatch: 94, side: 'home', t1: "United States", t2: "Bosnia & Herzegovina" },
    { id: 82, nextMatch: 94, side: 'away', t1: "Belgium", t2: "3rd Group A/H/I/J" },
    { id: 83, nextMatch: 93, side: 'home', t1: "Runner Up Group K", t2: "Runner Up Group L" },
    { id: 84, nextMatch: 93, side: 'away', t1: "Spain", t2: "Runner Up Group J" },
    { id: 76, nextMatch: 91, side: 'home', t1: "Brazil", t2: "Japan" },
    { id: 78, nextMatch: 91, side: 'away', t1: "Ivory Coast", t2: "Norway" },
    { id: 79, nextMatch: 92, side: 'home', t1: "Mexico", t2: "3rd Group C/E/H" },
    { id: 80, nextMatch: 92, side: 'away', t1: "Winner Group L", t2: "3rd Group E/I/J/K" },
    { id: 85, nextMatch: 96, side: 'home', t1: "Switzerland", t2: "3rd Group E/G/I/J" },
    { id: 87, nextMatch: 96, side: 'away', t1: "Winner Group K", t2: "3rd Group D/E/I/L" },
    { id: 86, nextMatch: 95, side: 'home', t1: "Argentina", t2: "Cabo Verde" },
    { id: 88, nextMatch: 95, side: 'away', t1: "Australia", t2: "Egypt" }
  ],
  r16: [
    { id: 89, nextMatch: 97, side: 'home', t1: "Winner Match 74", t2: "Winner Match 77" },
    { id: 90, nextMatch: 97, side: 'away', t1: "Winner Match 73", t2: "Winner Match 75" },
    { id: 91, nextMatch: 99, side: 'home', t1: "Winner Match 76", t2: "Winner Match 78" },
    { id: 92, nextMatch: 99, side: 'away', t1: "Winner Match 79", t2: "Winner Match 80" },
    { id: 93, nextMatch: 98, side: 'home', t1: "Winner Match 83", t2: "Winner Match 84" },
    { id: 94, nextMatch: 98, side: 'away', t1: "Winner Match 81", t2: "Winner Match 82" },
    { id: 95, nextMatch: 100, side: 'home', t1: "Winner Match 86", t2: "Winner Match 88" },
    { id: 96, nextMatch: 100, side: 'away', t1: "Winner Match 85", t2: "Winner Match 87" }
  ],
  qf: [
    { id: 97, nextMatch: 101, side: 'home', t1: "Winner Match 89", t2: "Winner Match 90" },
    { id: 98, nextMatch: 101, side: 'away', t1: "Winner Match 93", t2: "Winner Match 94" },
    { id: 99, nextMatch: 102, side: 'home', t1: "Winner Match 91", t2: "Winner Match 92" },
    { id: 100, nextMatch: 102, side: 'away', t1: "Winner Match 95", t2: "Winner Match 96" }
  ],
  sf: [
    { id: 101, nextMatch: 104, side: 'home', t1: "Winner Match 97", t2: "Winner Match 98" },
    { id: 102, nextMatch: 104, side: 'away', t1: "Winner Match 99", t2: "Winner Match 100" }
  ],
  finals: [
    { id: 103, nextMatch: null, side: null, t1: "Loser Match 101", t2: "Loser Match 102", isThirdPlace: true },
    { id: 104, nextMatch: null, side: null, t1: "Winner Match 101", t2: "Winner Match 102" }
  ]
};

const predictionState = {};

function initBracket() {
  Object.keys(bracketLayout).forEach(roundKey => {
    const pane = document.getElementById(roundKey);
    bracketLayout[roundKey].forEach(m => {
      predictionState[m.id] = {
        id: m.id,
        team1: m.t1,
        team2: m.t2,
        score1: null,
        score2: null,
        penaltyWinner: null,
        winner: null,
        loser: null,
        config: m
      };

      const matchRow = document.createElement("div");
      matchRow.className = "match-card";
      matchRow.id = `card_${m.id}`;
      matchRow.innerHTML = `
        <div class="match-info-label">Match ${m.id}</div>
        <div class="team home" id="t1_${m.id}">${m.t1}</div>
        <div><input class="score-input" type="number" min="0" max="9" placeholder="-" id="s1_${m.id}" oninput="evaluateMatch(${m.id})"></div>
        <div class="vs">${m.isThirdPlace ? '3rd Place' : 'VS'}</div>
        <div><input class="score-input" type="number" min="0" max="9" placeholder="-" id="s2_${m.id}" oninput="evaluateMatch(${m.id})"></div>
        <div class="team away" id="t2_${m.id}">${m.t2}</div>
        <div class="penalty-box" id="pbox_${m.id}">
          💥 Tie Match! Select penalty shootout advancing team:<br><br>
          <button class="p-btn" id="pbtn1_${m.id}" onclick="setPenaltyWinner(${m.id}, 1)"></button>
          <button class="p-btn" id="pbtn2_${m.id}" onclick="setPenaltyWinner(${m.id}, 2)"></button>
        </div>
      `;
      pane.appendChild(matchRow);
    });
  });
}

function evaluateMatch(matchId) {
  const match = predictionState[matchId];
  let s1El = document.getElementById(`s1_${matchId}`);
  let s2El = document.getElementById(`s2_${matchId}`);

  if (s1El.value !== "") { s1El.value = Math.max(0, Math.min(9, Math.floor(Number(s1El.value)))); match.score1 = Number(s1El.value); } else { match.score1 = null; }
  if (s2El.value !== "") { s2El.value = Math.max(0, Math.min(9, Math.floor(Number(s2El.value)))); match.score2 = Number(s2El.value); } else { match.score2 = null; }

  const pBox = document.getElementById(`pbox_${matchId}`);
  const btn1 = document.getElementById(`pbtn1_${matchId}`);
  const btn2 = document.getElementById(`pbtn2_${matchId}`);

  if (match.score1 === null || match.score2 === null) {
    pBox.classList.remove("show");
    match.winner = null;
    match.loser = null;
    propagateWinner(matchId);
    return;
  }

  if (match.score1 > match.score2) {
    pBox.classList.remove("show");
    match.winner = match.team1;
    match.loser = match.team2;
    match.penaltyWinner = null;
    propagateWinner(matchId);
  } else if (match.score2 > match.score1) {
    pBox.classList.remove("show");
    match.winner = match.team2;
    match.loser = match.team1;
    match.penaltyWinner = null;
    propagateWinner(matchId);
  } else {
    btn1.innerText = match.team1;
    btn2.innerText = match.team2;
    pBox.classList.add("show");
    
    if (match.penaltyWinner === 1) {
      match.winner = match.team1;
      match.loser = match.team2;
    } else if (match.penaltyWinner === 2) {
      match.winner = match.team2;
      match.loser = match.team1;
    } else {
      match.winner = null;
      match.loser = null;
    }
    propagateWinner(matchId);
  }
}

function setPenaltyWinner(matchId, teamIndex) {
  const match = predictionState[matchId];
  match.penaltyWinner = teamIndex;
  
  document.getElementById(`pbtn1_${matchId}`).classList.toggle("selected", teamIndex === 1);
  document.getElementById(`pbtn2_${matchId}`).classList.toggle("selected", teamIndex === 2);
  
  evaluateMatch(matchId);
}

function propagateWinner(matchId) {
  const match = predictionState[matchId];
  const config = match.config;

  if (config.nextMatch) {
    const nextMatch = predictionState[config.nextMatch];
    if (config.side === 'home') {
      nextMatch.team1 = match.winner ? match.winner : `Winner Match ${matchId}`;
      document.getElementById(`t1_${config.nextMatch}`).innerText = nextMatch.team1;
    } else {
      nextMatch.team2 = match.winner ? match.winner : `Winner Match ${matchId}`;
      document.getElementById(`t2_${config.nextMatch}`).innerText = nextMatch.team2;
    }
    evaluateMatch(config.nextMatch);
  }

  if (matchId === 101 || matchId === 102) {
    const thirdPlaceMatch = predictionState[103];
    if (matchId === 101) {
      thirdPlaceMatch.team1 = match.loser ? match.loser : "Loser Match 101";
      document.getElementById(`t1_${103}`).innerText = thirdPlaceMatch.team1;
    } else {
      thirdPlaceMatch.team2 = match.loser ? match.loser : "Loser Match 102";
      document.getElementById(`t2_${103}`).innerText = thirdPlaceMatch.team2;
    }
    evaluateMatch(103);
  }
}

function switchTab(roundId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.round-pane').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(roundId).classList.add('active');
}

function submitKnockouts() {
  const email = document.getElementById("email").value.trim();
  const name = document.getElementById("name").value.trim();
  const country = document.getElementById("country").value.trim();
  const phone = document.getElementById("phone").value.trim();

  // Identification verification
  if (!email || !name || !country || !phone) {
    alert("Please complete all participant identification fields.");
    return;
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    alert("Please enter a valid email address.");
    return;
  }

  const outputPredictions = [];
  let containsNullScores = false;

  Object.keys(predictionState).forEach(id => {
    const m = predictionState[id];
    if (m.score1 === null || m.score2 === null || !m.winner) {
      containsNullScores = true;
    }
    outputPredictions.push({
      matchId: m.id,
      team1: m.team1,
      team2: m.team2,
      score1: m.score1,
      score2: m.score2,
      winner: m.winner,
      method: m.penaltyWinner ? "Penalties" : "Regular/ET"
    });
  });

  // Strict check forcing all tournament entries to be provided before push triggers
  if (containsNullScores) {
    alert("⚠️ All tournament scores and tie-breakers must be entirely filled out before submitting!");
    return;
  }

  const currentTimestamp = new Date().toLocaleString();

  // Payload tracking configuration with precise requested alignment order
  const payload = { 
    timestamp: currentTimestamp,
    email: email,
    name: name, 
    country: country, 
    phone: phone, 
    predictions: outputPredictions 
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => alert("Knockout bracket submitted successfully!"))
  .catch(err => alert("Predictions submission sent successfully!"));
}

window.onload = initBracket;
</script>
</body>
</html>

</body>
</html>
